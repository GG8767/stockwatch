<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>STOCKWATCH TERMINAL - 終極韌性版</title>
    <style>
        /* --- 專業金融介面設計 --- */
        * { box-sizing: border-box; }
        body {
            background-color: #0d1117; color: #d1d4dc;
            font-family: 'Segoe UI', 'SF Pro Display', sans-serif;
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        .header {
            position: absolute; top: 0; width: 100%; height: 40px;
            background: rgba(22, 27, 34, 0.9); backdrop-filter: blur(8px);
            border-bottom: 1px solid #30363d;
            display: flex; align-items: center; padding: 0 20px; font-size: 11px; z-index: 100;
        }
        .header .logo { color: #ff9800; font-weight: bold; letter-spacing: 2px; margin-right: 20px; }
        .ma-legend { display: flex; gap: 15px; margin-left: 20px; font-size: 10px; }
        .ma-5 { color: #f1c40f; } .ma-20 { color: #9b59b6; } .ma-60 { color: #e67e22; }

        .status { margin-left: auto; display: flex; align-items: center; cursor: pointer; }
        .header .dot { width: 8px; height: 8px; background: #8b949e; border-radius: 50%; margin-right: 8px; }

        /* 左側：搜尋與動態清單 */
        .left-panel {
            width: 280px; background-color: #161b22;
            border-right: 1px solid #30363d; padding: 50px 10px 10px 10px;
            display: flex; flex-direction: column;
        }
        .search-box {
            background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
            color: white; padding: 10px; width: 100%; margin-bottom: 15px; outline: none;
        }
        
        #stock-list { flex: 1; overflow-y: auto; }
        .stock-item {
            cursor: pointer; padding: 12px; border-radius: 8px;
            margin-bottom: 5px; transition: 0.2s;
            background: #0d1117; display: flex; justify-content: space-between;
            font-size: 13px; border: 1px solid transparent;
        }
        .stock-item:hover { background: #21262d; }
        .stock-item.active { background: #1c2128; border: 1px solid #58a6ff; }

        /* 右側核心區 */
        .right-panel { flex: 1; padding: 50px 20px 20px 20px; display: flex; flex-direction: column; overflow-y: auto; }
        
        /* 🌟 圖表容器增加相對定位，方便顯示 Loading 文字 */
        #chart-wrapper { position: relative; min-height: 480px; margin-bottom: 20px; }
        #chart-container { height: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 12px; }
        #chart-loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7); padding: 15px 30px; border-radius: 8px;
            display: none; z-index: 10; border: 1px solid #58a6ff;
        }

        .dashboard { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        .alert-panel { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 25px; }
        .alert-panel.triggered { background: #2a1414; border: 1px solid #f85149; animation: pulse-red 1.5s infinite; }
        .price-display { font-size: 56px; font-weight: bold; color: white; letter-spacing: -2px; }

        .history-panel { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 15px; }
        
        @keyframes pulse-red { 0% { box-shadow: 0 0 0px #f85149; } 50% { box-shadow: 0 0 20px rgba(248,81,73,0.2); } 100% { box-shadow: 0 0 0px #f85149; } }
    </style>
</head>
<body>

    <div class="header">
        <span class="logo">STOCKWATCH TERMINAL</span>
        <div class="ma-legend">
            <span class="ma-5">● MA5</span><span class="ma-20">● MA20</span><span class="ma-60">● MA60</span>
        </div>
        <div class="status" onclick="initStockDatabase()">
            <div class="dot" id="status-dot"></div>
            <span id="update-time">初始化中...</span>
        </div>
    </div>

    <div class="left-panel">
        <input type="text" class="search-box" id="search-input" placeholder="搜尋代碼或名稱 (如: 2409)...">
        <div id="stock-list"></div>
    </div>

    <div class="right-panel">
        <h2 id="current-title" style="margin: 0 0 10px 0; color: white; font-weight: 500;">請選擇股票</h2>
        <div id="chart-wrapper">
            <div id="chart-container"></div>
            <div id="chart-loading">⌛ 數據讀取中...</div>
        </div>
        <div class="dashboard">
            <div class="alert-panel" id="alert-panel">
                <div style="display: flex; align-items: baseline;">
                    <span class="price-display" id="price-val">---</span>
                    <span style="margin-left: 15px; color: #238636; font-weight: bold;" id="target-val">GOAL: --</span>
                </div>
                <p id="status-text" style="margin: 10px 0 0 0; opacity: 0.6; font-size: 14px;">等待選擇標的。</p>
            </div>
            <div class="history-panel">
                <h4 style="margin: 0 0 10px 0; font-size: 14px; color: #ff9800;">即時 Tick 紀錄</h4>
                <table style="width:100%; font-size:12px; border-collapse: collapse;">
                    <tbody id="history-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>

    <script>
        const twseUrl = "https://openapi.twse.com.tw/v1/stock/ALL";
        const fallbackStocks = [
            {Code: "2330", Name: "台積電"}, {Code: "2409", Name: "友達"},
            {Code: "2317", Name: "鴻海"}, {Code: "2454", Name: "聯發科"}, {Code: "2603", Name: "長榮"}
        ];

        let allStocks = []; 
        let currentSymbol = '';
        let currentTarget = 0;
        let tickLog = [];

        const container = document.getElementById('chart-container');
        const loadingEl = document.getElementById('chart-loading');

        const chart = LightweightCharts.createChart(container, {
            width: container.clientWidth, height: 480,
            layout: { backgroundColor: '#0d1117', textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#1f2937' }, horzLines: { color: '#1f2937' } },
            timeScale: { rightOffset: 10, barSpacing: 8 }
        });

        const candlestickSeries = chart.addCandlestickSeries({ upColor: '#26a69a', downColor: '#ef5350' });
        const ma5Series = chart.addLineSeries({ color: '#f1c40f', lineWidth: 1 });
        const ma20Series = chart.addLineSeries({ color: '#9b59b6', lineWidth: 1 });
        const ma60Series = chart.addLineSeries({ color: '#e67e22', lineWidth: 2 });

        function calculateSMA(data, count) {
            const avg = [];
            for (let i = 0; i < data.length; i++) {
                if (i < count - 1) continue;
                let sum = 0;
                for (let j = 0; j < count; j++) sum += data[i - j].close;
                avg.push({ time: data[i].time, value: sum / count });
            }
            return avg;
        }

        async function initStockDatabase() {
            const dot = document.getElementById('status-dot');
            const updateTime = document.getElementById('update-time');
            dot.style.background = "#ff9800";
            updateTime.innerText = "正在連線證交所...";

            try {
                const response = await fetch(twseUrl);
                if (!response.ok) throw new Error();
                allStocks = await response.json();
                updateTime.innerText = `✅ 系統就緒 (${allStocks.length} 檔)`;
                dot.style.background = "#238636";
                renderStockList(allStocks.slice(0, 50));
            } catch (err) {
                allStocks = fallbackStocks;
                updateTime.innerText = "⚠️ 官方維護中，啟動備援";
                dot.style.background = "#f85149";
                renderStockList(allStocks);
            }
        }

        function renderStockList(list) {
            const listContainer = document.getElementById('stock-list');
            listContainer.innerHTML = list.map(s => `
                <div class="stock-item ${s.Code === currentSymbol ? 'active' : ''}" onclick="selectStock('${s.Code}', '${s.Name}')">
                    <span>${s.Code}</span><span style="opacity:0.6">${s.Name}</span>
                </div>
            `).join('');
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const filtered = allStocks.filter(s => s.Code.includes(keyword) || s.Name.includes(keyword));
            renderStockList(filtered.slice(0, 50));
        });

        async function loadRealHistory(symbol) {
            loadingEl.style.display = 'block'; // 顯示 Loading
            const statusText = document.getElementById('status-text');
            statusText.innerText = `⏳ 正在搬運 ${symbol} 的半年數據...`;

            const startDate = new Date();
            startDate.setMonth(startDate.getMonth() - 8);
            const finMindUrl = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${symbol}&start_date=${startDate.toISOString().split('T')[0]}`;
            
            try {
                const res = await fetch(finMindUrl);
                const json = await res.json();
                if (json.data && json.data.length > 0) {
                    const formatted = json.data.map(d => ({ time: d.date, open: d.open, high: d.max, low: d.min, close: d.close }));
                    candlestickSeries.setData(formatted);
                    ma5Series.setData(calculateSMA(formatted, 5));
                    ma20Series.setData(calculateSMA(formatted, 20));
                    ma60Series.setData(calculateSMA(formatted, 60));
                    chart.timeScale().fitContent();
                    statusText.innerText = "✅ 歷史走勢載入成功";
                    loadingEl.style.display = 'none';
                } else {
                    throw new Error("Empty data");
                }
            } catch (e) { 
                statusText.innerText = "⚠️ 資料庫忙碌中，請稍後再試";
                loadingEl.style.display = 'none';
            }
        }

        async function selectStock(code, name) {
            currentSymbol = code;
            document.getElementById('current-title').innerText = `${code} ${name}`;
            const inputTarget = prompt(`請設定 ${name} 的目標價:`, "0");
            currentTarget = parseFloat(inputTarget) || 0;
            document.getElementById('target-val').innerText = `GOAL: ${currentTarget}`;
            
            tickLog = [];
            document.getElementById('history-body').innerHTML = "";
            await loadRealHistory(code);
            await fetchRealtimeData();
        }

        async function fetchRealtimeData() {
            if (!currentSymbol) return;
            try {
                const response = await fetch(twseUrl);
                const allData = await response.json();
                const stock = allData.find(s => s.Code === currentSymbol);
                if (stock) {
                    const price = parseFloat(stock.ClosingPrice);
                    document.getElementById('price-val').innerText = price.toFixed(2);
                    
                    const now = new Date().toLocaleTimeString();
                    tickLog.unshift({ time: now, price: price });
                    if (tickLog.length > 5) tickLog.pop();
                    document.getElementById('history-body').innerHTML = tickLog.map(h => `<tr><td style="padding:5px 0">${h.time}</td><td style="color:#58a6ff;font-weight:bold">${h.price.toFixed(2)}</td></tr>`).join('');

                    if (price >= currentTarget && currentTarget > 0) {
                        document.getElementById('alert-panel').classList.add('triggered');
                    } else {
                        document.getElementById('alert-panel').classList.remove('triggered');
                    }
                }
            } catch (e) { }
        }

        initStockDatabase();
        setInterval(fetchRealtimeData, 30000);
        window.onresize = () => chart.resize(container.clientWidth, 480);
    </script>
</body>
</html>
