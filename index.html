<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>STOCKWATCH TERMINAL - 雙動態指標版</title>
    <style>
        * { box-sizing: border-box; }
        body { background-color: #0d1117; color: #d1d4dc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        .header { position: absolute; top: 0; width: 100%; height: 40px; background: rgba(22, 27, 34, 0.9); border-bottom: 1px solid #30363d; display: flex; align-items: center; padding: 0 20px; font-size: 11px; z-index: 100; }
        .header .logo { color: #ff9800; font-weight: bold; letter-spacing: 2px; margin-right: 20px; }
        
        .ma-legend { display: flex; gap: 15px; font-size: 12px; font-weight: bold; }
        .ma-toggle { cursor: pointer; user-select: none; transition: 0.2s; opacity: 1; padding: 2px 5px; border-radius: 4px; }
        .ma-toggle:hover { background: rgba(255,255,255,0.1); }
        .ma-toggle.disabled { opacity: 0.3; text-decoration: line-through; }

        .status { margin-left: auto; display: flex; align-items: center; cursor: pointer; padding: 5px 10px; border-radius: 4px; transition: 0.2s; }
        .status:hover { background: rgba(255,255,255,0.1); }
        .dot { width: 8px; height: 8px; background: #8b949e; border-radius: 50%; margin-right: 8px; }

        .left-panel { width: 290px; background-color: #161b22; border-right: 1px solid #30363d; padding: 50px 10px 10px 10px; display: flex; flex-direction: column; }
        .search-box { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: white; padding: 10px; margin-bottom: 15px; outline: none; }
        #stock-list { flex: 1; overflow-y: auto; padding-right: 5px; }
        
        .stock-item { cursor: pointer; padding: 12px; border-radius: 8px; margin-bottom: 5px; background: #0d1117; display: flex; justify-content: space-between; align-items: center; font-size: 13px; border: 1px solid transparent; transition: 0.2s; }
        .stock-item:hover { background: #21262d; }
        .stock-item.active { border: 1px solid #58a6ff; background: #1c2128; }

        .right-panel { flex: 1; padding: 50px 20px 20px 20px; display: flex; flex-direction: column; overflow: hidden; }
        .title-bar { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
        
        #chart-container { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 12px; min-height: 0; position: relative; overflow: hidden; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #58a6ff; }
    </style>
</head>
<body>

    <div class="header">
        <span class="logo">STOCKWATCH TERMINAL</span>
        <div class="ma-legend">
            <span class="ma-toggle" id="toggle-ma5" style="color:#f1c40f">● MA5</span>
            <span class="ma-toggle" id="toggle-ma20" style="color:#9b59b6">● MA20</span>
            <span class="ma-toggle" id="toggle-ma60" style="color:#e67e22">● MA60</span>
        </div>
        <div class="status" onclick="initStockDatabase()" title="點擊強制重新連線">
            <div class="dot" id="status-dot"></div>
            <span id="update-time">資料庫啟動中...</span>
        </div>
    </div>

    <div class="left-panel">
        <input type="text" class="search-box" id="search-input" placeholder="搜尋上市個股或 ETF...">
        <div id="stock-list"></div>
    </div>

    <div class="right-panel">
        <div class="title-bar">
            <h2 id="current-title" style="margin: 0; color: white; font-weight: 500;">請選擇標的</h2>
            <h2 id="current-price" style="margin: 0; color: #58a6ff; font-weight: bold; letter-spacing: 1px;"></h2>
        </div>
        <div id="chart-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>

    <script>
        window.onerror = function(msg, src, lineno) { console.error("Error:", msg, "at line:", lineno); return true; };

        async function fetchSafe(url, timeoutMs = 8000) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeoutMs);
            const response = await fetch(url, { signal: controller.signal });
            clearTimeout(id);
            if (!response.ok) throw new Error("HTTP " + response.status);
            return response.json();
        }

        const top50Codes = [
            "0050", "0056", "00878", "00919", "00929", "00713", "006208",
            "2330", "2317", "2454", "2382", "2308", "2881", "2882", "2603", "2409", "3231",
            "2344", "2303", "2891", "1301", "2002", "2412", "1216", "2886", "2884", "2618",
            "2609", "3481", "2356", "2379", "3034", "3037", "3008", "2353", "2357", "2324",
            "3661", "6415", "3017", "2395", "2376", "2449", "2362", "2385", "3293", "6274"
        ];

        let allStocks = [], defaultTop50List = [], currentSymbol = '';
        let chart, candlestickSeries, volumeSeries, ma5Series, ma20Series, ma60Series;
        
        let chartLegend;   // 左上角的詳細資訊
        let priceTracker;  // 🌟 跟隨滑鼠的精確價格標籤
        
        window.globalChartData = [];
        window.globalVolData = [];

        function setupMAToggles() {
            const toggles = [
                { id: 'toggle-ma5', series: () => ma5Series },
                { id: 'toggle-ma20', series: () => ma20Series },
                { id: 'toggle-ma60', series: () => ma60Series }
            ];
            toggles.forEach(t => {
                document.getElementById(t.id).addEventListener('click', function() {
                    this.classList.toggle('disabled');
                    const isVisible = !this.classList.contains('disabled');
                    const series = t.series();
                    if (series) series.applyOptions({ visible: isVisible });
                });
            });
        }
        setupMAToggles();

        // 渲染左上角的詳細資料
        function renderLegend(paramData, paramVol, paramTime) {
            if (!paramData || paramData.open === undefined) return;
            
            let timeStr = typeof paramTime === 'object' ? `${paramTime.year}-${String(paramTime.month).padStart(2,'0')}-${String(paramTime.day).padStart(2,'0')}` : paramTime;

            let prevClose = paramData.open; 
            if (window.globalChartData && window.globalChartData.length > 0) {
                let idx = window.globalChartData.findIndex(x => x.time === timeStr || x.time === paramTime);
                if (idx > 0) prevClose = window.globalChartData[idx - 1].close;
            }

            const o = paramData.open.toFixed(2), h = paramData.high.toFixed(2), l = paramData.low.toFixed(2), c = paramData.close.toFixed(2);
            const changeVal = (paramData.close - prevClose);
            const changeStr = changeVal.toFixed(2);
            const changePct = ((changeVal / prevClose) * 100).toFixed(2);
            
            const candleColor = paramData.close >= paramData.open ? '#26a69a' : '#ef5350';
            const changeColor = changeVal >= 0 ? '#26a69a' : '#ef5350';
            const sign = changeVal > 0 ? '+' : '';
            const v = paramVol !== undefined ? (paramVol / 1000).toFixed(2) + 'K' : '--';

            chartLegend.innerHTML = `
                <div style="font-size: 13px; margin-bottom: 6px; display: flex; align-items: center;">
                    <span style="margin-right: 12px; font-weight: bold; color: #d1d4dc;">${timeStr}</span>
                    <span style="margin-right: 10px;">開=<span style="color:${candleColor}">${o}</span></span>
                    <span style="margin-right: 10px;">高=<span style="color:${candleColor}">${h}</span></span>
                    <span style="margin-right: 10px;">低=<span style="color:${candleColor}">${l}</span></span>
                    <span style="margin-right: 10px;">收=<span style="color:${candleColor}">${c}</span></span>
                    <span style="color:${changeColor}; font-weight: bold; margin-left: 5px;">${sign}${changeStr} (${sign}${changePct}%)</span>
                </div>
                <div style="font-size: 13px;">
                    <span style="color: #d1d4dc;">成交量 <span style="color:#ef5350">${v}</span></span>
                </div>
            `;
        }

        function initChart() {
            if (chart) return; 
            const container = document.getElementById('chart-container');
            
            // 建立固定在左上角的詳細圖例
            chartLegend = document.createElement('div');
            chartLegend.style = `
                position: absolute; left: 15px; top: 12px; z-index: 10; 
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                color: #8b949e; pointer-events: none; 
            `;
            container.appendChild(chartLegend);

            // 🌟 建立跟著滑鼠跑的「精確價格標籤」
            priceTracker = document.createElement('div');
            priceTracker.style = `
                position: absolute; display: none; z-index: 50; 
                font-family: 'SF Pro Display', monospace; font-size: 13px; font-weight: bold;
                color: #ffffff; pointer-events: none; 
                background: #2962ff; /* 專業亮藍色 */
                padding: 4px 8px; border-radius: 4px;
                box-shadow: 0 2px 6px rgba(0,0,0,0.4);
                transition: left 0.05s ease, top 0.05s ease; /* 滑順跟隨 */
            `;
            container.appendChild(priceTracker);

            chart = LightweightCharts.createChart(container, {
                width: container.clientWidth, 
                height: container.clientHeight,
                layout: { backgroundColor: 'transparent', textColor: '#d1d4dc' },
                grid: { vertLines: { color: '#1f2937' }, horzLines: { color: '#1f2937' } },
                timeScale: { rightOffset: 5, barSpacing: 6 },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal }
            });

            candlestickSeries = chart.addCandlestickSeries({ upColor: '#26a69a', downColor: '#ef5350' });
            ma5Series = chart.addLineSeries({ color: '#f1c40f', lineWidth: 1 });
            ma20Series = chart.addLineSeries({ color: '#9b59b6', lineWidth: 1 });
            ma60Series = chart.addLineSeries({ color: '#e67e22', lineWidth: 2 });
            volumeSeries = chart.addHistogramSeries({ color: '#26a69a', priceFormat: { type: 'volume' }, priceScaleId: '' });

            volumeSeries.priceScale().applyOptions({ scaleMargins: { top: 0.8, bottom: 0 } });
            candlestickSeries.priceScale().applyOptions({ scaleMargins: { top: 0.1, bottom: 0.3 } });

            // 🌟 雙動態指標：處理左上角詳細資料 ＋ 滑鼠精確價格
            chart.subscribeCrosshairMove(param => {
                
                // 1. 處理左上角的 K 棒詳細資料
                let targetData, targetVol, targetTime;
                if (param.point === undefined || !param.time || param.point.x < 0 || param.point.y < 0 || param.point.x > container.clientWidth || param.point.y > container.clientHeight) {
                    if (!window.globalChartData || window.globalChartData.length === 0) return;
                    const lastIdx = window.globalChartData.length - 1;
                    targetData = window.globalChartData[lastIdx];
                    targetVol = window.globalVolData[lastIdx] ? window.globalVolData[lastIdx].value : 0;
                    targetTime = targetData.time;
                    
                    // 滑鼠離開圖表時，隱藏跟隨標籤
                    priceTracker.style.display = 'none';
                } else {
                    targetData = param.seriesPrices.get(candlestickSeries);
                    const volObj = param.seriesPrices.get(volumeSeries);
                    targetVol = volObj !== undefined ? volObj : 0;
                    targetTime = param.time;
                    
                    // 🌟 2. 處理滑鼠旁邊的「精確價格追蹤器」
                    // 把滑鼠所在的 Y 座標，精準轉換成價格數字
                    const exactPrice = candlestickSeries.coordinateToPrice(param.point.y);
                    if (exactPrice !== null) {
                        priceTracker.style.display = 'block';
                        priceTracker.innerHTML = exactPrice.toFixed(2); // 只顯示純粹的價格
                        
                        // 設定防撞偏移量，讓標籤出現在滑鼠右下方
                        let left = param.point.x + 15;
                        let top = param.point.y + 15;
                        if (left + priceTracker.offsetWidth > container.clientWidth) left = param.point.x - priceTracker.offsetWidth - 10;
                        if (top + priceTracker.offsetHeight > container.clientHeight) top = param.point.y - priceTracker.offsetHeight - 10;
                        
                        priceTracker.style.left = left + 'px';
                        priceTracker.style.top = top + 'px';
                    } else {
                        priceTracker.style.display = 'none';
                    }
                }
                renderLegend(targetData, targetVol, targetTime);
            });
        }

        function calculateSMA(data, count) {
            const avg = [];
            for (let i = 0; i < data.length; i++) {
                if (i < count - 1) continue;
                let sum = 0;
                for (let j = 0; j < count; j++) sum += data[i - j].close;
                avg.push({ time: data[i].time, value: sum / count });
            }
            return avg;
        }

        async function initStockDatabase() {
            const btn = document.getElementById('update-time');
            const dot = document.getElementById('status-dot');
            btn.innerText = "連線資料庫中...";
            dot.style.background = "#ff9800";
            
            try {
                const url = "https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockInfo";
                const json = await fetchSafe(url, 10000);
                
                if (json.data && json.data.length > 0) {
                    const uniqueStocks = [];
                    const seenCodes = new Set();
                    
                    for (const s of json.data) {
                        if (s.type === 'twse' && !/購|售|牛|熊/.test(s.stock_name)) {
                            if (!seenCodes.has(s.stock_id)) {
                                seenCodes.add(s.stock_id);
                                const isETF = /^00/.test(s.stock_id) || s.stock_name.includes('ETF') || s.industry_category === 'ETF';
                                uniqueStocks.push({ Code: s.stock_id, Name: s.stock_name, Market: isETF ? 'ETF' : '上市' });
                            }
                        }
                    }
                    allStocks = uniqueStocks;
                    defaultTop50List = allStocks.filter(s => top50Codes.includes(s.Code));
                    defaultTop50List.sort((a, b) => (a.Market === 'ETF' ? -1 : 1));
                    
                    btn.innerText = `✅ 系統就緒`;
                    dot.style.background = "#238636";
                    renderStockList(defaultTop50List, true);
                }
            } catch (err) {
                btn.innerText = "⚠️ 網路異常，重試中";
                dot.style.background = "#f85149";
            }
            setTimeout(initChart, 100);
        }

        function renderStockList(list, isHomePage = false) {
            const displayList = isHomePage ? list : list.slice(0, 50); 
            
            let html = displayList.map(s => {
                const isETF = s.Market === 'ETF';
                const bgColor = isETF ? '#311b92' : '#004d40';
                const borderColor = isETF ? '#7e57c2' : '#26a69a';
                const tagText = isETF ? 'ETF' : 'TWSE';

                return `
                <div class="stock-item ${s.Code === currentSymbol ? 'active' : ''}" onclick="selectStock('${s.Code}', '${s.Name}')">
                    <div style="display:flex; align-items:center;">
                        <span style="font-size:10px; padding:2px 5px; border-radius:4px; margin-right:8px; 
                                     background: ${bgColor}; border:1px solid ${borderColor}; color: #e0e0e0; font-weight: bold; width: 45px; text-align: center;">
                            ${tagText}
                        </span>
                        <span style="font-weight:bold; font-size:14px;">${s.Code}</span>
                    </div>
                    <span style="opacity:0.7; font-size: 13px;">${s.Name}</span>
                </div>
                `;
            }).join('');
            document.getElementById('stock-list').innerHTML = html;
        }

        async function loadOneYearHistory(symbol) {
            const startDate = new Date();
            startDate.setMonth(startDate.getMonth() - 14);
            const finMindUrl = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${symbol}&start_date=${startDate.toISOString().split('T')[0]}`;
            
            try {
                const json = await fetchSafe(finMindUrl, 10000);
                if (json.data && json.data.length > 0) {
                    const formatted = json.data.map(d => ({ time: d.date, open: d.open, high: d.max, low: d.min, close: d.close }));
                    const volumeData = json.data.map(d => ({ 
                        time: d.date, value: d.Trading_Volume, 
                        color: d.close >= d.open ? 'rgba(38, 166, 154, 0.5)' : 'rgba(239, 83, 80, 0.5)' 
                    }));
                    
                    window.globalChartData = formatted;
                    window.globalVolData = volumeData;

                    candlestickSeries.setData(formatted);
                    volumeSeries.setData(volumeData);
                    ma5Series.setData(calculateSMA(formatted, 5));
                    ma20Series.setData(calculateSMA(formatted, 20));
                    ma60Series.setData(calculateSMA(formatted, 60));
                    
                    chart.timeScale().fitContent();
                    
                    if (formatted.length > 0) {
                        renderLegend(formatted[formatted.length-1], volumeData[volumeData.length-1].value, formatted[formatted.length-1].time);
                    }
                    
                    if(document.getElementById('toggle-ma5').classList.contains('disabled')) ma5Series.applyOptions({ visible: false });
                    if(document.getElementById('toggle-ma20').classList.contains('disabled')) ma20Series.applyOptions({ visible: false });
                    if(document.getElementById('toggle-ma60').classList.contains('disabled')) ma60Series.applyOptions({ visible: false });
                }
            } catch (e) { console.error("歷史資料載入失敗"); }
        }

        async function selectStock(code, name) {
            currentSymbol = code;
            document.getElementById('current-title').innerText = `${code} ${name}`;
            document.getElementById('current-price').innerText = "---";
            
            if (chartLegend) chartLegend.innerHTML = '<span style="color:#8b949e;">載入資料中...</span>';
            if (priceTracker) priceTracker.style.display = 'none';
            
            candlestickSeries.setData([]); volumeSeries.setData([]);
            ma5Series.setData([]); ma20Series.setData([]); ma60Series.setData([]);
            window.globalChartData = []; window.globalVolData = [];

            const keyword = document.getElementById('search-input').value.trim().toLowerCase();
            if (keyword === "") renderStockList(defaultTop50List, true);
            else renderStockList(allStocks.filter(s => s.Code.includes(keyword) || s.Name.includes(keyword)));
            
            await loadOneYearHistory(code);
            await fetchRealtimeSync();
        }

        async function fetchRealtimeSync() {
            if (!currentSymbol || !window.globalChartData || window.globalChartData.length === 0) return;
            let price = 0, open = 0, high = 0, low = 0, vol = 0;

            try {
                const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${currentSymbol}.TW?interval=1d&range=1d`;
                const yData = await fetchSafe(yahooUrl, 5000);
                const result = yData.chart.result[0];
                price = result.meta.regularMarketPrice; vol = result.meta.regularMarketVolume || 0;
                const indicators = result.indicators.quote[0];
                open = indicators.open[0] || price; high = indicators.high[0] || price; low = indicators.low[0] || price;
            } catch (yahooError) {
                try {
                    const twData = await fetchSafe("https://openapi.twse.com.tw/v1/stock/ALL", 5000);
                    const s = twData.find(x => x.Code === currentSymbol);
                    if (s) { price = parseFloat(s.ClosingPrice); open = parseFloat(s.OpeningPrice)||price; high = parseFloat(s.HighestPrice)||price; low = parseFloat(s.LowestPrice)||price; vol = parseFloat(s.TradeVolume)||0; }
                } catch (twseError) {}
            }

            if (price > 0) {
                document.getElementById('current-price').innerText = `$${price.toFixed(2)}`;
                const time = new Date().toISOString().split('T')[0];
                
                const newData = { time, open, high, low, close: price };
                candlestickSeries.update(newData);
                volumeSeries.update({ time, value: vol });
                
                const lastIdx = window.globalChartData.length - 1;
                if (window.globalChartData[lastIdx].time === time) {
                    window.globalChartData[lastIdx] = newData;
                    if(window.globalVolData[lastIdx]) window.globalVolData[lastIdx].value = vol;
                } else {
                    window.globalChartData.push(newData);
                    window.globalVolData.push({ time, value: vol });
                }
            }
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            const k = e.target.value.trim().toLowerCase();
            if (k === '') renderStockList(defaultTop50List, true);
            else renderStockList(allStocks.filter(s => s.Code.includes(k) || s.Name.includes(k)));
        });

        initStockDatabase();
        setInterval(fetchRealtimeSync, 30000);
        
        window.onresize = () => { 
            if(chart) {
                const container = document.getElementById('chart-container');
                chart.resize(container.clientWidth, container.clientHeight); 
            }
        };
    </script>
</body>
</html>
