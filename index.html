<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>STOCKWATCH TERMINAL - 完整 K 線歷史版</title>
    <style>
        /* --- 專業金融介面設計 --- */
        * { box-sizing: border-box; }
        body {
            background-color: #0d1117; color: #d1d4dc;
            font-family: 'Segoe UI', 'SF Pro Display', sans-serif;
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        .header {
            position: absolute; top: 0; width: 100%; height: 40px;
            background: rgba(22, 27, 34, 0.9); backdrop-filter: blur(8px);
            border-bottom: 1px solid #30363d;
            display: flex; align-items: center; padding: 0 20px; font-size: 11px; z-index: 100;
        }
        .header .logo { color: #ff9800; font-weight: bold; letter-spacing: 2px; margin-right: 20px; }
        .header .status { margin-left: auto; display: flex; align-items: center; cursor: pointer; }
        .header .dot { width: 8px; height: 8px; background: #8b949e; border-radius: 50%; margin-right: 8px; }
        .header .dot.active { animation: blink 1s infinite; }

        .left-panel {
            width: 260px; background-color: #161b22;
            border-right: 1px solid #30363d; padding: 50px 10px 10px 10px;
        }
        .stock-item {
            cursor: pointer; padding: 15px; border-radius: 10px;
            margin-bottom: 8px; transition: 0.2s;
            background: #0d1117; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid transparent;
        }
        .stock-item.active { background: #1c2128; border: 1px solid #58a6ff; }

        .right-panel { flex: 1; padding: 50px 20px 20px 20px; display: flex; flex-direction: column; overflow-y: auto; }
        #chart-container { 
            min-height: 450px; background: #0d1117; 
            border: 1px solid #30363d; border-radius: 12px; margin-bottom: 20px; 
        }

        .dashboard { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        .alert-panel { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 25px; }
        .alert-panel.triggered { background: #2a1414; border: 1px solid #f85149; animation: pulse-red 1.5s infinite; }
        .price-display { font-size: 56px; font-weight: bold; color: white; letter-spacing: -2px; }

        .history-panel { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 15px; }
        .history-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .history-table th { text-align: left; opacity: 0.5; padding-bottom: 10px; border-bottom: 1px solid #30363d; }
        .history-table td { padding: 8px 0; border-bottom: 1px solid #21262d; }
        
        @keyframes blink { 50% { opacity: 0; } }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0px #f85149; } 50% { box-shadow: 0 0 20px rgba(248,81,73,0.2); } 100% { box-shadow: 0 0 0px #f85149; } }
    </style>
</head>
<body>

    <div class="header">
        <span class="logo">STOCKWATCH TERMINAL</span>
        <span style="opacity: 0.5;">APP MODE | K-LINE HISTORY ENABLED</span>
        <div class="status" onclick="fetchMarketData()">
            <div class="dot active" id="status-dot"></div>
            <span id="update-time">點擊同步</span>
        </div>
    </div>

    <div class="left-panel">
        <div class="stock-item active" data-symbol="2330" data-target="1100"><span>2330 台積電</span></div>
        <div class="stock-item" data-symbol="2409" data-target="28.0"><span>2409 友達</span></div>
        <div class="stock-item" data-symbol="2317" data-target="230"><span>2317 鴻海</span></div>
    </div>

    <div class="right-panel">
        <h2 id="current-title" style="margin: 0 0 10px 0; color: white; font-weight: 500;">2330 台積電</h2>
        <div id="chart-container"></div>
        
        <div class="dashboard">
            <div class="alert-panel" id="alert-panel">
                <div style="display: flex; align-items: baseline;">
                    <span class="price-display" id="price-val">---</span>
                    <span style="margin-left: 15px; color: #238636; font-weight: bold;" id="target-val">GOAL: 1100</span>
                </div>
                <p id="status-text" style="margin: 10px 0 0 0; opacity: 0.6; font-size: 14px;">初始化 K 線數據...</p>
            </div>

            <div class="history-panel">
                <h4 style="margin: 0 0 10px 0; font-size: 14px; color: #ff9800;">即時價格紀錄 (Tick)</h4>
                <table class="history-table">
                    <thead><tr><th>時間</th><th>價格</th></tr></thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>

    <script>
        const twseUrl = "https://openapi.twse.com.tw/v1/stock/ALL";
        const container = document.getElementById('chart-container');
        const historyBody = document.getElementById('history-body');
        
        let currentSymbol = '2330';
        let currentTarget = 1100;
        let tickLog = [];

        // 1. 初始化圖表
        const chart = LightweightCharts.createChart(container, {
            width: container.clientWidth, height: 450,
            layout: { backgroundColor: '#0d1117', textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#1f2937' }, horzLines: { color: '#1f2937' } },
            timeScale: { timeVisible: true, secondsVisible: false }
        });
        const candlestickSeries = chart.addCandlestickSeries({ upColor: '#26a69a', downColor: '#ef5350' });

        // 🌟 2. 歷史數據載入邏輯
        // 在正式環境中，這裡可以替換為 fetch(歷史 API 網址)
        function loadHistoricalData(symbol) {
            const history = [];
            const basePrice = symbol === '2330' ? 1060 : (symbol === '2317' ? 215 : 27);
            const now = new Date();
            
            // 生成過去 30 天的模擬 K 線
            for (let i = 30; i > 0; i--) {
                const date = new Date(now);
                date.setDate(date.getDate() - i);
                
                // 簡單的隨機走勢模擬
                const open = basePrice + (Math.random() - 0.5) * 10;
                const close = open + (Math.random() - 0.5) * 10;
                history.push({
                    time: date.getTime() / 1000,
                    open: open,
                    high: Math.max(open, close) + Math.random() * 2,
                    low: Math.min(open, close) - Math.random() * 2,
                    close: close
                });
            }
            candlestickSeries.setData(history);
        }

        function addToTickLog(price) {
            const now = new Date().toLocaleTimeString();
            tickLog.unshift({ time: now, price: price });
            if (tickLog.length > 5) tickLog.pop();
            historyBody.innerHTML = tickLog.map(h => `<tr><td>${h.time}</td><td style="color:#58a6ff; font-weight:bold;">${h.price.toFixed(2)}</td></tr>`).join('');
        }

        async function fetchMarketData() {
            try {
                const response = await fetch(twseUrl);
                const allData = await response.json();
                const stock = allData.find(s => s.Code === currentSymbol);

                if (stock) {
                    const price = parseFloat(stock.ClosingPrice);
                    document.getElementById('price-val').innerText = price.toFixed(2);
                    document.getElementById('update-time').innerText = "最後同步: " + new Date().toLocaleTimeString();
                    document.getElementById('status-dot').style.background = "#238636";

                    addToTickLog(price);

                    // 🌟 更新圖表最後一根 K 線
                    candlestickSeries.update({
                        time: Math.floor(Date.now() / 1000),
                        open: parseFloat(stock.OpeningPrice) || price,
                        high: parseFloat(stock.HighestPrice) || price,
                        low: parseFloat(stock.LowestPrice) || price,
                        close: price
                    });

                    const panel = document.getElementById('alert-panel');
                    if (price >= currentTarget) {
                        panel.classList.add('triggered');
                        document.getElementById('status-text').innerHTML = `⚠️ <b>達標！</b> 報價 ${price} 觸發`;
                    } else {
                        panel.classList.remove('triggered');
                        document.getElementById('status-text').innerText = `距離目標還差 ${(currentTarget - price).toFixed(2)} 元`;
                    }
                }
            } catch (error) {
                document.getElementById('status-dot').style.background = "#f85149";
            }
        }

        // 3. 切換股票監聽
        document.querySelectorAll('.stock-item').forEach(item => {
            item.addEventListener('click', function() {
                currentSymbol = this.getAttribute('data-symbol');
                currentTarget = parseFloat(this.getAttribute('data-target'));
                document.getElementById('current-title').innerText = this.innerText;
                document.getElementById('target-val').innerText = `GOAL: ${currentTarget}`;
                document.querySelectorAll('.stock-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
                
                tickLog = [];
                historyBody.innerHTML = "";
                
                // 🌟 切換時先載入歷史 K 線
                loadHistoricalData(currentSymbol);
                fetchMarketData();
            });
        });

        // 初始化
        loadHistoricalData(currentSymbol);
        fetchMarketData();
        setInterval(fetchMarketData, 15000);
        window.onresize = () => chart.resize(container.clientWidth, 450);
    </script>
</body>
</html>
