<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>STOCKWATCH TERMINAL - 旗艦專業版 2.0</title>
    <style>
        * { box-sizing: border-box; }
        body { background-color: #0d1117; color: #d1d4dc; font-family: 'Segoe UI', -apple-system, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* 頂部導覽列 */
        .header { position: absolute; top: 0; width: 100%; height: 40px; background: rgba(22, 27, 34, 0.95); border-bottom: 1px solid #30363d; display: flex; align-items: center; padding: 0 20px; font-size: 11px; z-index: 100; }
        .header .logo { color: #ff9800; font-weight: bold; letter-spacing: 2px; margin-right: 25px; }
        .ma-legend { display: flex; gap: 15px; font-size: 12px; font-weight: bold; }
        .ma-toggle { cursor: pointer; user-select: none; transition: 0.2s; opacity: 1; padding: 2px 5px; border-radius: 4px; }
        .ma-toggle:hover { background: rgba(255,255,255,0.1); }
        .ma-toggle.disabled { opacity: 0.3; text-decoration: line-through; }
        .status { margin-left: auto; display: flex; align-items: center; font-size: 12px; color: #8b949e; }
        .dot { width: 8px; height: 8px; background: #238636; border-radius: 50%; margin-right: 8px; box-shadow: 0 0 8px #238636; }

        /* 左側列表 */
        .left-panel { width: 300px; background-color: #161b22; border-right: 1px solid #30363d; padding: 50px 10px 10px 10px; display: flex; flex-direction: column; }
        .search-box { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: white; padding: 10px; margin-bottom: 15px; outline: none; }
        #stock-list { flex: 1; overflow-y: auto; }
        .stock-item { cursor: pointer; padding: 12px; border-radius: 8px; margin-bottom: 5px; background: #0d1117; display: flex; justify-content: space-between; align-items: center; font-size: 13px; border: 1px solid transparent; transition: 0.2s; }
        .stock-item:hover { background: #21262d; }
        .stock-item.active { border: 1px solid #58a6ff; background: #1c2128; }

        /* 右側主視窗 */
        .right-panel { flex: 1; padding: 50px 20px 20px 20px; display: flex; flex-direction: column; overflow: hidden; }
        .title-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        #chart-wrapper { display: flex; flex-direction: column; flex: 1; gap: 10px; overflow: hidden; }
        #main-chart { flex: 6; position: relative; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }
        #intraday-chart { flex: 3; position: relative; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }

        .intraday-header { position: absolute; left: 12px; top: 10px; z-index: 10; display: flex; align-items: center; gap: 10px; }
        .range-select { background: #161b22; color: #58a6ff; border: 1px solid #30363d; border-radius: 4px; padding: 3px 6px; font-size: 12px; font-weight: bold; outline: none; cursor: pointer; }

        /* 下方數據牆 */
        .metrics-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 1px; background: #30363d; border: 1px solid #30363d; border-radius: 4px; margin-top: 10px; font-size: 12px; }
        .metric-item { background: #161b22; padding: 8px 10px; display: flex; justify-content: space-between; }
        .m-label { color: #8b949e; }
        .m-val { color: #ffffff; font-family: monospace; font-weight: bold; }
        .m-up { color: #26a69a; }
        .m-down { color: #ef5350; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <span class="logo">STOCKWATCH TERMINAL</span>
        <div class="ma-legend">
            <span class="ma-toggle" id="toggle-ma5" style="color:#f1c40f">● MA5</span>
            <span class="ma-toggle" id="toggle-ma20" style="color:#9b59b6">● MA20</span>
            <span class="ma-toggle" id="toggle-ma60" style="color:#e67e22">● MA60</span>
        </div>
        <div class="status"><div class="dot"></div>系統連線中</div>
    </div>

    <div class="left-panel">
        <input type="text" class="search-box" id="search-input" placeholder="搜尋代號或名稱...">
        <div id="stock-list"></div>
    </div>

    <div class="right-panel">
        <div class="title-bar">
            <h2 id="current-title" style="margin: 0; color: white; font-weight: 600; font-size: 24px;">請選擇標的</h2>
            <div id="current-price-area" style="text-align: right;">
                <div id="current-price" style="font-size: 28px; font-weight: bold; color: #58a6ff;">---</div>
                <div id="current-change" style="font-size: 14px; font-weight: bold;">-- (--)</div>
            </div>
        </div>
        
        <div id="chart-wrapper">
            <div id="main-chart"></div>
            <div id="intraday-chart">
                <div class="intraday-header">
                    <select id="intraday-range" class="range-select">
                        <option value="1d" selected>當日</option>
                        <option value="5d">五日</option>
                        <option value="1mo">近月</option>
                    </select>
                    <span id="intraday-status" style="font-size:12px; color:#8b949e; font-weight:bold;">📊 初始化走勢...</span>
                </div>
            </div>
        </div>

        <div class="metrics-grid" id="metrics-grid">
            <div class="metric-item"><span class="m-label">成交</span><span class="m-val" id="m-price">--</span></div>
            <div class="metric-item"><span class="m-label">漲跌</span><span class="m-val" id="m-change">--</span></div>
            <div class="metric-item"><span class="m-label">幅度</span><span class="m-val" id="m-pct">--</span></div>
            <div class="metric-item"><span class="m-label">開盤</span><span class="m-val" id="m-open">--</span></div>
            <div class="metric-item"><span class="m-label">最高</span><span class="m-val" id="m-high">--</span></div>
            <div class="metric-item"><span class="m-label">最低</span><span class="m-val" id="m-low">--</span></div>
            <div class="metric-item"><span class="m-label">昨收</span><span class="m-val" id="m-prev">--</span></div>
            <div class="metric-item"><span class="m-label">總量</span><span class="m-val" id="m-total" style="color:#f1c40f">--</span></div>
            <div class="metric-item"><span class="m-label">振幅</span><span class="m-val" id="m-swing">--</span></div>
            <div class="metric-item"><span class="m-label">買進</span><span class="m-val" id="m-buy">--</span></div>
            <div class="metric-item"><span class="m-label">賣出</span><span class="m-val" id="m-sell">--</span></div>
            <div class="metric-item"><span class="m-label">均價</span><span class="m-val" id="m-avg">--</span></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>

    <script>
        // 🌟 修復日期顯示邏輯
        function formatDisplayTime(t) {
            if (!t) return "--";
            if (typeof t === 'object' && t.year) {
                return `${t.year}-${String(t.month).padStart(2,'0')}-${String(t.day).padStart(2,'0')}`;
            }
            return t;
        }

        // 🌟 強化版三級跳 Fetch：Direct -> AllOrigins -> ThingProxy
        async function fetchUltraResilient(url, timeoutMs = 8000) {
            // 第一跳：嘗試直接連線
            try {
                const response = await fetch(url, { signal: AbortSignal.timeout(timeoutMs) });
                if (response.ok) return await response.json();
            } catch (e) { console.warn("Direct fetch failed, trying Proxy 1..."); }

            // 第二跳：AllOrigins 轉機
            try {
                const proxyUrl1 = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                const response = await fetch(proxyUrl1, { signal: AbortSignal.timeout(timeoutMs + 2000) });
                if (response.ok) {
                    const data = await response.json();
                    return JSON.parse(data.contents);
                }
            } catch (e) { console.warn("Proxy 1 failed, trying Proxy 2..."); }

            // 第三跳：ThingProxy 轉機
            try {
                const proxyUrl2 = `https://thingproxy.freeboard.io/fetch/${url}`;
                const response = await fetch(proxyUrl2, { signal: AbortSignal.timeout(timeoutMs + 4000) });
                if (response.ok) return await response.json();
            } catch (e) { throw new Error("All fetching paths failed."); }
        }

        const top50Codes = ["0050", "0056", "00878", "00919", "00929", "2330", "2317", "2454", "2382", "2308", "2881", "2882", "2603", "2409", "3231", "2344", "2303", "2891", "1301", "2002", "2412", "1216", "2886", "2884", "2618", "2609", "3481", "2356", "2379", "3034", "3037", "3008", "2353", "2357", "2324", "3661", "6415", "3017", "2395", "2376", "2449", "2362", "2385", "3293", "6274"];
        let allStocks = [], currentSymbol = '', globalChartData = [];
        let chart, candleSeries, volumeSeries, ma5, ma20, ma60, legend;
        let intraChart, intraSeries, intraVolSeries;

        function initChart() {
            if (chart) return;
            const mainBox = document.getElementById('main-chart');
            legend = document.createElement('div');
            legend.style = `position: absolute; left: 15px; top: 12px; z-index: 10; font-family: monospace; font-size: 13px; color: #8b949e; pointer-events: none;`;
            mainBox.appendChild(legend);

            chart = LightweightCharts.createChart(mainBox, {
                width: mainBox.clientWidth, height: mainBox.clientHeight,
                layout: { backgroundColor: 'transparent', textColor: '#d1d4dc' },
                grid: { vertLines: { color: '#1f2937' }, horzLines: { color: '#1f2937' } },
                timeScale: { rightOffset: 5, barSpacing: 6 },
            });

            candleSeries = chart.addCandlestickSeries({ upColor: '#26a69a', downColor: '#ef5350' });
            ma5 = chart.addLineSeries({ color: '#f1c40f', lineWidth: 1 });
            ma20 = chart.addLineSeries({ color: '#9b59b6', lineWidth: 1 });
            ma60 = chart.addLineSeries({ color: '#e67e22', lineWidth: 1.5 });
            volumeSeries = chart.addHistogramSeries({ color: '#26a69a', priceFormat: { type: 'volume' }, priceScaleId: '' });
            volumeSeries.priceScale().applyOptions({ scaleMargins: { top: 0.85, bottom: 0 } });

            const intraBox = document.getElementById('intraday-chart');
            intraChart = LightweightCharts.createChart(intraBox, {
                width: intraBox.clientWidth, height: intraBox.clientHeight,
                layout: { backgroundColor: 'transparent', textColor: '#8b949e' },
                grid: { vertLines: { color: '#1f2937' }, horzLines: { color: '#1f2937' } },
                timeScale: { timeVisible: true, secondsVisible: false },
            });
            intraSeries = intraChart.addAreaSeries({ lineColor: '#58a6ff', topColor: 'rgba(88, 166, 255, 0.3)', bottomColor: 'rgba(88, 166, 255, 0)', lineWidth: 2 });
            intraVolSeries = intraChart.addHistogramSeries({ color: 'rgba(88, 166, 255, 0.5)', priceFormat: { type: 'volume' }, priceScaleId: '' });
            intraVolSeries.priceScale().applyOptions({ scaleMargins: { top: 0.7, bottom: 0 } });

            chart.subscribeCrosshairMove(param => {
                if (!param.point || !param.time) { updateLegend(globalChartData[globalChartData.length-1]); return; }
                const d = param.seriesPrices.get(candleSeries);
                if(d) updateLegend({...d, time: param.time});
            });
        }

        function updateLegend(d) {
            if(!d) return;
            const color = d.close >= d.open ? '#26a69a' : '#ef5350';
            const timeStr = formatDisplayTime(d.time);
            legend.innerHTML = `<span style="font-weight:bold; color:#d1d4dc; margin-right:15px;">${timeStr}</span>
                開=<span style="color:${color}">${d.open.toFixed(2)}</span> 
                高=<span style="color:${color}">${d.high.toFixed(2)}</span> 
                低=<span style="color:${color}">${d.low.toFixed(2)}</span> 
                收=<span style="color:${color}">${d.close.toFixed(2)}</span>`;
        }

        async function fetchQuoteAndMetrics() {
            if (!currentSymbol) return;
            try {
                const qUrl = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${currentSymbol}.TW`;
                const qData = await fetchUltraResilient(qUrl);
                const r = qData.quoteResponse.result[0];
                if (r) {
                    const p = r.regularMarketPrice, chg = r.regularMarketChange, pct = r.regularMarketChangePercent;
                    const c = chg >= 0 ? '#26a69a' : '#ef5350', s = chg >= 0 ? '+' : '';

                    document.getElementById('current-price').innerText = p.toFixed(2);
                    document.getElementById('current-price').style.color = c;
                    document.getElementById('current-change').innerText = `${s}${chg.toFixed(2)} (${s}${pct.toFixed(2)}%)`;
                    document.getElementById('current-change').style.color = c;

                    document.getElementById('m-price').innerText = p.toFixed(2);
                    document.getElementById('m-change').innerText = `${s}${chg.toFixed(2)}`;
                    document.getElementById('m-change').className = `m-val ${chg>=0?'m-up':'m-down'}`;
                    document.getElementById('m-pct').innerText = `${s}${pct.toFixed(2)}%`;
                    document.getElementById('m-pct').className = `m-val ${chg>=0?'m-up':'m-down'}`;
                    document.getElementById('m-open').innerText = (r.regularMarketOpen || p).toFixed(2);
                    document.getElementById('m-high').innerText = (r.regularMarketDayHigh || p).toFixed(2);
                    document.getElementById('m-low').innerText = (r.regularMarketDayLow || p).toFixed(2);
                    document.getElementById('m-total').innerText = (r.regularMarketVolume / 1000).toFixed(0) + ' K';
                    document.getElementById('m-prev').innerText = (r.regularMarketPreviousClose || p).toFixed(2);
                    document.getElementById('m-buy').innerText = (r.bid || p).toFixed(2);
                    document.getElementById('m-sell').innerText = (r.ask || p).toFixed(2);
                    document.getElementById('m-avg').innerText = (r.averageDailyVolume3Month / 1000).toFixed(0) + ' K';
                    document.getElementById('m-swing').innerText = r.regularMarketPreviousClose ? (( (r.regularMarketDayHigh - r.regularMarketDayLow) / r.regularMarketPreviousClose) * 100).toFixed(2) + '%' : '--';
                }
            } catch (e) { console.warn("Quote Error"); }
        }

        async function fetchIntraday() {
            if (!currentSymbol) return;
            const r = document.getElementById('intraday-range').value;
            const st = document.getElementById('intraday-status');
            const fR = r === '1d' ? '7d' : r, fI = r === '1d' ? '1m' : (r === '5d' ? '5m' : '30m');
            const yUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${currentSymbol}.TW?interval=${fI}&range=${fR}`;
            
            try {
                const yData = await fetchUltraResilient(yUrl);
                const res = yData.chart.result[0];
                if (res && res.timestamp) {
                    const lastD = new Set([new Date(res.timestamp[res.timestamp.length-1]*1000).toDateString()]);
                    let pts = [], vls = [];
                    for(let i=0; i<res.timestamp.length; i++) {
                        const c = res.indicators.quote[0].close[i], v = res.indicators.quote[0].volume[i];
                        if(c !== null) {
                            if(r !== '1d' || lastD.has(new Date(res.timestamp[i]*1000).toDateString())) {
                                pts.push({ time: res.timestamp[i], value: c }); vls.push({ time: res.timestamp[i], value: v });
                            }
                        }
                    }
                    if(pts.length > 0) {
                        intraSeries.setData(pts); intraVolSeries.setData(vls);
                        intraChart.timeScale().fitContent();
                        const mxV = Math.max(...pts.map(p => p.value)), miV = Math.min(...pts.map(p => p.value));
                        intraSeries.setMarkers([
                            { time: pts.find(p => p.value === mxV).time, position: 'aboveBar', color: '#ef5350', shape: 'arrowDown', text: '高 ' + mxV.toFixed(2) },
                            { time: pts.find(p => p.value === miV).time, position: 'belowBar', color: '#26a69a', shape: 'arrowUp', text: '低 ' + miV.toFixed(2) }
                        ]);
                        st.innerText = `📊 ${r==='1d'?'當日':r}走勢 - 已同步`;
                    }
                }
            } catch (e) { st.innerText = "⚠️ 訊號微弱，嘗試備援通道中..."; }
        }

        async function selectStock(code, name) {
            currentSymbol = code; document.getElementById('current-title').innerText = `${code} ${name}`;
            intraSeries.setData([]); intraVolSeries.setData([]); candleSeries.setData([]); volumeSeries.setData([]);
            const start = new Date(); start.setMonth(start.getMonth() - 14);
            try {
                const data = await fetchUltraResilient(`https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${code}&start_date=${start.toISOString().split('T')[0]}`);
                const fmt = data.data.map(d => ({ time: d.date, open: d.open, high: d.max, low: d.min, close: d.close }));
                const vls = data.data.map(d => ({ time: d.date, value: d.Trading_Volume, color: d.close >= d.open ? 'rgba(38, 166, 154, 0.5)' : 'rgba(239, 83, 80, 0.5)' }));
                globalChartData = fmt; candleSeries.setData(fmt); volumeSeries.setData(vls);
                ma5.setData(calcMA(fmt, 5)); ma20.setData(calcMA(fmt, 20)); ma60.setData(calcMA(fmt, 60));
                chart.timeScale().fitContent(); updateLegend(fmt[fmt.length-1]);
            } catch (e) {}
            await fetchQuoteAndMetrics(); await fetchIntraday();
        }

        function calcMA(d, c) {
            const r = [];
            for (let i = 0; i < d.length; i++) {
                if (i < c - 1) continue;
                let s = 0; for (let j = 0; j < c; j++) s += d[i-j].close;
                r.push({ time: d[i].time, value: s/c });
            }
            return r;
        }

        async function initStockDatabase() {
            try {
                const data = await fetchUltraResilient("https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockInfo");
                const seen = new Set();
                allStocks = data.data.filter(s => s.type === 'twse' && !seen.has(s.stock_id) && seen.add(s.stock_id))
                    .map(s => ({ Code: s.stock_id, Name: s.stock_name, Market: (s.stock_id.startsWith('00')||s.industry_category==='ETF')?'ETF':'上市' }));
                renderList(allStocks.filter(s => top50Codes.includes(s.Code)).sort((a,b) => a.Market==='ETF'?-1:1), true);
            } catch (e) {}
            setTimeout(initChart, 100);
        }

        function renderList(list, isHome = false) {
            document.getElementById('stock-list').innerHTML = (isHome ? list : list.slice(0,50)).map(s => `
                <div class="stock-item ${s.Code === currentSymbol ? 'active' : ''}" onclick="selectStock('${s.Code}', '${s.Name}')">
                    <div style="display:flex; align-items:center;">
                        <span style="font-size:9px; padding:2px 4px; border-radius:3px; margin-right:8px; background:${s.Market==='ETF'?'#311b92':'#004d40'}; font-weight:bold; width:38px; text-align:center;">${s.Market}</span>
                        <span style="font-weight:bold;">${s.Code}</span>
                    </div>
                    <span style="opacity:0.6; font-size:12px;">${s.Name}</span>
                </div>`).join('');
        }

        document.getElementById('search-input').addEventListener('input', e => {
            const k = e.target.value.trim().toLowerCase();
            renderList(k === "" ? allStocks.filter(s => top50Codes.includes(s.Code)) : allStocks.filter(s => s.Code.includes(k) || s.Name.includes(k)), k === "");
        });

        document.getElementById('intraday-range').addEventListener('change', fetchIntraday);
        document.querySelectorAll('.ma-toggle').forEach(el => el.onclick = function(){
            this.classList.toggle('disabled');
            const s = this.id==='toggle-ma5'?ma5:(this.id==='toggle-ma20'?ma20:ma60);
            s.applyOptions({ visible: !this.classList.contains('disabled') });
        });

        initStockDatabase();
        setInterval(fetchQuoteAndMetrics, 15000);
        setInterval(fetchIntraday, 60000);
        window.onresize = () => {
            if (chart) chart.resize(document.getElementById('main-chart').clientWidth, document.getElementById('main-chart').clientHeight);
            if (intraChart) intraChart.resize(document.getElementById('intraday-chart').clientWidth, document.getElementById('intraday-chart').clientHeight);
        };
    </script>
</body>
</html>
