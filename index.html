<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>STOCKWATCH TERMINAL - 絕對防禦版</title>
    <style>
        * { box-sizing: border-box; }
        body { background-color: #0d1117; color: #d1d4dc; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        .header { position: absolute; top: 0; width: 100%; height: 40px; background: rgba(22, 27, 34, 0.9); border-bottom: 1px solid #30363d; display: flex; align-items: center; padding: 0 20px; font-size: 11px; z-index: 100; }
        .header .logo { color: #ff9800; font-weight: bold; letter-spacing: 2px; margin-right: 20px; }
        .ma-legend { display: flex; gap: 15px; font-size: 10px; }

        .status { margin-left: auto; display: flex; align-items: center; cursor: pointer; padding: 5px 10px; border-radius: 4px; transition: 0.2s; }
        .status:hover { background: rgba(255,255,255,0.1); }
        .dot { width: 8px; height: 8px; background: #8b949e; border-radius: 50%; margin-right: 8px; }

        .left-panel { width: 290px; background-color: #161b22; border-right: 1px solid #30363d; padding: 50px 10px 10px 10px; display: flex; flex-direction: column; }
        .search-box { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: white; padding: 10px; margin-bottom: 15px; outline: none; }
        #stock-list { flex: 1; overflow-y: auto; padding-right: 5px; }
        
        .stock-item { cursor: pointer; padding: 12px; border-radius: 8px; margin-bottom: 5px; background: #0d1117; display: flex; justify-content: space-between; align-items: center; font-size: 13px; border: 1px solid transparent; transition: 0.2s; }
        .stock-item:hover { background: #21262d; }
        .stock-item.active { border: 1px solid #58a6ff; background: #1c2128; }

        .retry-btn { background: #f85149; color: white; border: none; padding: 10px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 15px; transition: 0.2s; box-shadow: 0 4px 15px rgba(248,81,73,0.2); }
        .retry-btn:hover { background: #ff6a63; box-shadow: 0 4px 20px rgba(248,81,73,0.4); }

        .right-panel { flex: 1; padding: 50px 20px 20px 20px; display: flex; flex-direction: column; overflow-y: auto; }
        #chart-container { min-height: 520px; background: #0d1117; border: 1px solid #30363d; border-radius: 12px; margin-bottom: 20px; }

        .dashboard { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        .alert-panel { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 25px; transition: 0.3s; }
        .price-display { font-size: 56px; font-weight: bold; color: white; letter-spacing: -2px; }
        
        .target-tag { color: #238636; font-weight: bold; margin-left: 20px; font-size: 16px; }
        .target-input { background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; padding: 6px 10px; width: 90px; margin-left: 8px; font-weight: bold; font-size: 16px; outline: none; }
        .target-input:focus { border-color: #238636; }

        .log-panel { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 15px; font-size: 12px; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #58a6ff; }
    </style>
</head>
<body>

    <div class="header">
        <span class="logo">STOCKWATCH TERMINAL</span>
        <div class="ma-legend">
            <span style="color:#f1c40f">● MA5</span><span style="color:#9b59b6">● MA20</span><span style="color:#e67e22">● MA60</span>
            <span style="color:#26a69a; margin-left:10px;">📊 成交量</span>
        </div>
        <div class="status" onclick="initStockDatabase()" title="點擊強制重新連線">
            <div class="dot" id="status-dot"></div>
            <span id="update-time">系統啟動中...</span>
        </div>
    </div>

    <div class="left-panel">
        <input type="text" class="search-box" id="search-input" placeholder="搜尋 2000+ 檔上市/櫃標的...">
        <div id="stock-list"></div>
    </div>

    <div class="right-panel">
        <h2 id="current-title" style="margin: 0 0 10px 0; color: white; font-weight: 500;">請選擇股票</h2>
        <div id="chart-container"></div>
        
        <div class="dashboard">
            <div class="alert-panel" id="alert-panel">
                <div style="display: flex; align-items: baseline;">
                    <span class="price-display" id="price-val">---</span>
                    <span class="target-tag">GOAL:</span>
                    <input type="number" id="target-input" class="target-input" value="0" placeholder="目標價">
                </div>
                <p id="status-text" style="margin: 10px 0 0 0; opacity: 0.6;">提示：雙引擎獨立運作，保證絕不當機。</p>
            </div>
            
            <div class="log-panel">
                <h4 style="margin: 0 0 10px 0; color: #ff9800;">即時狀態監控</h4>
                <div id="tick-body" style="line-height: 1.6; color: #58a6ff;">等待資料...</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>

    <script>
        window.onerror = function(msg, src, lineno) {
            document.getElementById('status-text').innerHTML = `<span style="color:#f85149">系統通知: 畫面已防護 (${lineno})</span>`;
            return true;
        };

        // 安全的超時抓取 (10秒)
        async function fetchSafe(url) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), 10000);
            const response = await fetch(url, { signal: controller.signal });
            clearTimeout(id);
            if (!response.ok) throw new Error("HTTP 錯誤");
            return response.json();
        }

        const twseUrl = "https://openapi.twse.com.tw/v1/stock/ALL"; 
        const tpexUrl = "https://www.tpex.org.tw/openapi/v1/tpex_mainboard_quotes"; 
        
        // 超大型備援名單，保證畫面永遠豐富
        const fallbackStocks = [
            {Code: "2330", Name: "台積電", Market: "上市"}, {Code: "2409", Name: "友達", Market: "上市"}, 
            {Code: "2317", Name: "鴻海", Market: "上市"}, {Code: "2454", Name: "聯發科", Market: "上市"},
            {Code: "2308", Name: "台達電", Market: "上市"}, {Code: "2603", Name: "長榮", Market: "上市"},
            {Code: "2881", Name: "富邦金", Market: "上市"}, {Code: "2882", Name: "國泰金", Market: "上市"},
            {Code: "2382", Name: "廣達", Market: "上市"}, {Code: "3231", Name: "緯創", Market: "上市"},
            {Code: "8069", Name: "元太", Market: "上櫃"}, {Code: "3105", Name: "穩懋", Market: "上櫃"},
            {Code: "6488", Name: "環球晶", Market: "上櫃"}, {Code: "5483", Name: "中美晶", Market: "上櫃"},
            {Code: "8299", Name: "群聯", Market: "上櫃"}, {Code: "3529", Name: "力旺", Market: "上櫃"}
        ];
        
        let allStocks = [], currentSymbol = '', tickLog = [];
        let chart, candlestickSeries, volumeSeries, ma5Series, ma20Series, ma60Series;

        function initChart() {
            if (chart) return; 
            const container = document.getElementById('chart-container');
            chart = LightweightCharts.createChart(container, {
                width: container.clientWidth, height: 520,
                layout: { backgroundColor: '#0d1117', textColor: '#d1d4dc' },
                grid: { vertLines: { color: '#1f2937' }, horzLines: { color: '#1f2937' } },
                timeScale: { rightOffset: 5, barSpacing: 6 } 
            });

            candlestickSeries = chart.addCandlestickSeries({ upColor: '#26a69a', downColor: '#ef5350' });
            ma5Series = chart.addLineSeries({ color: '#f1c40f', lineWidth: 1 });
            ma20Series = chart.addLineSeries({ color: '#9b59b6', lineWidth: 1 });
            ma60Series = chart.addLineSeries({ color: '#e67e22', lineWidth: 2 });
            volumeSeries = chart.addHistogramSeries({ color: '#26a69a', priceFormat: { type: 'volume' }, priceScaleId: '' });

            volumeSeries.priceScale().applyOptions({ scaleMargins: { top: 0.8, bottom: 0 } });
            candlestickSeries.priceScale().applyOptions({ scaleMargins: { top: 0.1, bottom: 0.3 } });
        }

        function calculateSMA(data, count) {
            const avg = [];
            for (let i = 0; i < data.length; i++) {
                if (i < count - 1) continue;
                let sum = 0;
                for (let j = 0; j < count; j++) sum += data[i - j].close;
                avg.push({ time: data[i].time, value: sum / count });
            }
            return avg;
        }

        // 🌟 獨立存活引擎：分開抓取上市與上櫃
        async function initStockDatabase() {
            const btn = document.getElementById('update-time');
            const dot = document.getElementById('status-dot');
            btn.innerText = "資料庫雙核啟動中...";
            dot.style.background = "#ff9800";
            
            let twseList = [], tpexList = [];
            let statusMsgs = [];

            // 1. 抓取上市 (TWSE)
            try {
                const twseData = await fetchSafe(twseUrl);
                twseList = twseData.map(s => ({ Code: s.Code, Name: s.Name, Market: '上市' }));
                statusMsgs.push("上市OK");
            } catch (e) { statusMsgs.push("上市失敗"); }

            // 2. 抓取上櫃 (TPEx)
            try {
                const tpexData = await fetchSafe(tpexUrl);
                tpexList = tpexData.map(s => ({ Code: s.SecuritiesCompanyCode, Name: s.CompanyName, Market: '上櫃' }));
                statusMsgs.push("上櫃OK");
            } catch (e) { statusMsgs.push("上櫃失敗"); }

            // 3. 結算結果
            allStocks = [...twseList, ...tpexList];

            if (allStocks.length > 0) {
                btn.innerText = `✅ 狀態: ${statusMsgs.join(' / ')} (${allStocks.length} 檔)`;
                dot.style.background = "#238636";
                renderStockList(allStocks);
            } else {
                // 如果兩個都死透了，啟用超級備援
                allStocks = fallbackStocks;
                btn.innerText = "⚠️ 全面離線 (啟用本機資料庫)";
                dot.style.background = "#f85149";
                renderStockList(allStocks);
            }
            initChart();
        }

        function renderStockList(list) {
            const displayList = list.slice(0, 50); 
            
            let html = displayList.map(s => `
                <div class="stock-item ${s.Code === currentSymbol ? 'active' : ''}" onclick="selectStock('${s.Code}', '${s.Name}')">
                    <div style="display:flex; align-items:center;">
                        <span style="font-size:10px; padding:2px 4px; border-radius:3px; margin-right:8px; 
                                     background: ${s.Market==='上市'?'#004d40':'#3e2723'}; 
                                     border:1px solid ${s.Market==='上市'?'#26a69a':'#e67e22'}">
                            ${s.Market}
                        </span>
                        <span style="font-weight:bold;">${s.Code}</span>
                    </div>
                    <span style="opacity:0.6">${s.Name}</span>
                </div>
            `).join('');

            if (allStocks === fallbackStocks) {
                html += `
                    <div style="margin-top: 20px; text-align: center;">
                        <span style="font-size: 11px; color: #f85149;">目前網路阻擋，請稍後重試</span>
                        <button class="retry-btn" onclick="initStockDatabase()">
                            🔄 重新敲門 (重試連線)
                        </button>
                    </div>`;
            } else if (list.length > 50) {
                html += `<div style="text-align:center; opacity:0.4; padding: 15px 0; font-size:12px;">...隱藏其餘標的，請使用搜尋框</div>`;
            }
            document.getElementById('stock-list').innerHTML = html;
        }

        async function loadOneYearHistory(symbol) {
            const statusText = document.getElementById('status-text');
            statusText.innerText = "⏳ 讀取雲端歷史 K 線中...";
            
            const startDate = new Date();
            startDate.setMonth(startDate.getMonth() - 14);
            const finMindUrl = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${symbol}&start_date=${startDate.toISOString().split('T')[0]}`;
            
            try {
                const json = await fetchSafe(finMindUrl);
                if (json.data && json.data.length > 0) {
                    const formatted = json.data.map(d => ({ time: d.date, open: d.open, high: d.max, low: d.min, close: d.close }));
                    const volumeData = json.data.map(d => ({ 
                        time: d.date, value: d.Trading_Volume, 
                        color: d.close >= d.open ? 'rgba(38, 166, 154, 0.5)' : 'rgba(239, 83, 80, 0.5)' 
                    }));
                    
                    candlestickSeries.setData(formatted);
                    volumeSeries.setData(volumeData);
                    ma5Series.setData(calculateSMA(formatted, 5));
                    ma20Series.setData(calculateSMA(formatted, 20));
                    ma60Series.setData(calculateSMA(formatted, 60));
                    
                    chart.timeScale().fitContent();
                    statusText.innerHTML = "✅ 歷史數據載入成功";
                } else {
                    statusText.innerHTML = "⚠️ 找不到此標的歷史資料";
                }
            } catch (e) {
                statusText.innerHTML = `<span style="color:#f85149">❌ 歷史資料庫連線超時</span>`;
            }
        }

        async function selectStock(code, name) {
            currentSymbol = code;
            document.getElementById('current-title').innerText = `${code} ${name}`;
            
            document.getElementById('target-input').value = "0"; 
            document.getElementById('alert-panel').style.background = "#161b22";
            document.getElementById('alert-panel').style.border = "1px solid #30363d";
            tickLog = []; 
            document.getElementById('tick-body').innerText = "";
            
            const keyword = document.getElementById('search-input').value.toLowerCase();
            const currentList = keyword ? allStocks.filter(s => s.Code.includes(keyword) || s.Name.includes(keyword)) : allStocks;
            renderStockList(currentList);
            
            await loadOneYearHistory(code);
            await fetchRealtimeSync();
        }

        async function fetchRealtimeSync() {
            if (!currentSymbol) return;
            try {
                const stockInfo = allStocks.find(x => x.Code === currentSymbol);
                if (!stockInfo) return;

                let price = 0, open = 0, high = 0, low = 0, vol = 0;

                // 即時數據也使用最乾淨的 URL
                if (stockInfo.Market === '上市') {
                    const allData = await fetchSafe(twseUrl);
                    const s = allData.find(x => x.Code === currentSymbol);
                    if (s) {
                        price = parseFloat(s.ClosingPrice); open = parseFloat(s.OpeningPrice)||price; high = parseFloat(s.HighestPrice)||price; low = parseFloat(s.LowestPrice)||price; vol = parseFloat(s.TradeVolume)||0;
                    }
                } else {
                    const allData = await fetchSafe(tpexUrl);
                    const s = allData.find(x => x.SecuritiesCompanyCode === currentSymbol);
                    if (s) {
                        price = parseFloat(s.Close); open = parseFloat(s.Open)||price; high = parseFloat(s.High)||price; low = parseFloat(s.Low)||price; vol = parseFloat(s.TradingVolume)||0;
                    }
                }

                if (price > 0) {
                    document.getElementById('price-val').innerText = price.toFixed(2);
                    
                    const time = new Date().toISOString().split('T')[0];
                    candlestickSeries.update({ time, open, high, low, close: price });
                    volumeSeries.update({ time, value: vol });

                    tickLog.unshift(`[${new Date().toLocaleTimeString()}] 即時報價: $${price.toFixed(2)}`);
                    if (tickLog.length > 5) tickLog.pop();
                    document.getElementById('tick-body').innerHTML = tickLog.join('<br>');

                    const target = parseFloat(document.getElementById('target-input').value) || 0;
                    if (price >= target && target > 0) {
                        document.getElementById('alert-panel').style.background = "#2a1414";
                        document.getElementById('alert-panel').style.border = "1px solid #f85149";
                    } else {
                        document.getElementById('alert-panel').style.background = "#161b22";
                        document.getElementById('alert-panel').style.border = "1px solid #30363d";
                    }
                }
            } catch (e) {
                console.log("即時同步等候中...");
            }
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            const k = e.target.value.toLowerCase();
            renderStockList(allStocks.filter(s => s.Code.includes(k) || s.Name.includes(k)));
        });
        document.getElementById('target-input').addEventListener('input', fetchRealtimeSync); 

        initStockDatabase();
        setInterval(fetchRealtimeSync, 30000);
        window.onresize = () => { if(chart) chart.resize(container.clientWidth, 520); };
    </script>
</body>
</html>
