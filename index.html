<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>STOCKWATCH TERMINAL - 專業價量版</title>
    <style>
        /* --- 專業金融介面：深色高對比 --- */
        * { box-sizing: border-box; }
        body {
            background-color: #0d1117; color: #d1d4dc;
            font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        .header {
            position: absolute; top: 0; width: 100%; height: 40px;
            background: rgba(22, 27, 34, 0.9); border-bottom: 1px solid #30363d;
            display: flex; align-items: center; padding: 0 20px; font-size: 11px; z-index: 100;
        }
        .header .logo { color: #ff9800; font-weight: bold; letter-spacing: 2px; margin-right: 20px; }
        .ma-legend { display: flex; gap: 15px; font-size: 10px; }

        .status { margin-left: auto; display: flex; align-items: center; cursor: pointer; }
        .dot { width: 8px; height: 8px; background: #8b949e; border-radius: 50%; margin-right: 8px; }

        /* 左側搜尋面板 */
        .left-panel {
            width: 280px; background-color: #161b22; border-right: 1px solid #30363d;
            padding: 50px 10px 10px 10px; display: flex; flex-direction: column;
        }
        .search-box { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: white; padding: 10px; margin-bottom: 15px; outline: none; }
        #stock-list { flex: 1; overflow-y: auto; }
        .stock-item { cursor: pointer; padding: 12px; border-radius: 8px; margin-bottom: 5px; background: #0d1117; display: flex; justify-content: space-between; font-size: 13px; }
        .stock-item.active { border: 1px solid #58a6ff; background: #1c2128; }

        /* 右側核心圖表 */
        .right-panel { flex: 1; padding: 50px 20px 20px 20px; display: flex; flex-direction: column; overflow-y: auto; }
        #chart-container { min-height: 520px; background: #0d1117; border: 1px solid #30363d; border-radius: 12px; margin-bottom: 20px; }

        .dashboard { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        .alert-panel { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 25px; }
        .price-display { font-size: 56px; font-weight: bold; color: white; letter-spacing: -2px; }
        .target-tag { color: #238636; font-weight: bold; margin-left: 15px; font-size: 18px; }

        .log-panel { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 15px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <span class="logo">STOCKWATCH TERMINAL</span>
        <div class="ma-legend">
            <span style="color:#f1c40f">● MA5</span><span style="color:#9b59b6">● MA20</span><span style="color:#e67e22">● MA60</span>
            <span style="color:#26a69a; margin-left:10px;">📊 成交量 (VOL)</span>
        </div>
        <div class="status" onclick="initStockDatabase()">
            <div class="dot" id="status-dot"></div>
            <span id="update-time">等待數據同步...</span>
        </div>
    </div>

    <div class="left-panel">
        <input type="text" class="search-box" id="search-input" placeholder="輸入代碼，例如: 2409...">
        <div id="stock-list"></div>
    </div>

    <div class="right-panel">
        <h2 id="current-title" style="margin: 0 0 10px 0; color: white; font-weight: 500;">請搜尋並選擇股票</h2>
        <div id="chart-container"></div>
        
        <div class="dashboard">
            <div class="alert-panel" id="alert-panel">
                <div style="display: flex; align-items: baseline;">
                    <span class="price-display" id="price-val">---</span>
                    <span class="target-tag" id="target-val">GOAL: --</span>
                </div>
                <p id="status-text" style="margin: 10px 0 0 0; opacity: 0.6;">提示：凌晨 API 頻繁維護，若圖表空白請明早再試。</p>
            </div>
            
            <div class="log-panel">
                <h4 style="margin: 0 0 10px 0; color: #ff9800;">當次同步紀錄</h4>
                <div id="tick-body" style="line-height: 1.6; color: #58a6ff;"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>

    <script>
        const twseUrl = "https://openapi.twse.com.tw/v1/stock/ALL";
        const fallbackStocks = [{Code: "2330", Name: "台積電"}, {Code: "2409", Name: "友達"}, {Code: "2317", Name: "鴻海"}];
        let allStocks = [], currentSymbol = '', currentTarget = 0, tickLog = [];

        // 1. 初始化專業圖表 (價量分離)
        const container = document.getElementById('chart-container');
        const chart = LightweightCharts.createChart(container, {
            width: container.clientWidth, height: 520,
            layout: { backgroundColor: '#0d1117', textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#1f2937' }, horzLines: { color: '#1f2937' } },
            timeScale: { rightOffset: 5, barSpacing: 10 }
        });

        // K線層
        const candlestickSeries = chart.addCandlestickSeries({ upColor: '#26a69a', downColor: '#ef5350' });
        // 均線層
        const ma5Series = chart.addLineSeries({ color: '#f1c40f', lineWidth: 1 });
        const ma20Series = chart.addLineSeries({ color: '#9b59b6', lineWidth: 1 });
        const ma60Series = chart.addLineSeries({ color: '#e67e22', lineWidth: 2 });
        // 成交量層 (縮放在底部)
        const volumeSeries = chart.addHistogramSeries({
            color: '#26a69a', priceFormat: { type: 'volume' }, priceScaleId: '' 
        });

        volumeSeries.priceScale().applyOptions({ scaleMargins: { top: 0.8, bottom: 0 } });
        candlestickSeries.priceScale().applyOptions({ scaleMargins: { top: 0.1, bottom: 0.3 } });

        function calculateSMA(data, count) {
            const avg = [];
            for (let i = 0; i < data.length; i++) {
                if (i < count - 1) continue;
                let sum = 0;
                for (let j = 0; j < count; j++) sum += data[i - j].close;
                avg.push({ time: data[i].time, value: sum / count });
            }
            return avg;
        }

        async function initStockDatabase() {
            try {
                const response = await fetch(twseUrl);
                allStocks = await response.json();
                document.getElementById('update-time').innerText = `已載入 ${allStocks.length} 檔股票`;
                document.getElementById('status-dot').style.background = "#238636";
                renderStockList(allStocks.slice(0, 50));
            } catch (err) {
                allStocks = fallbackStocks;
                document.getElementById('update-time').innerText = "官方維護中 (備援模式)";
                renderStockList(allStocks);
            }
        }

        function renderStockList(list) {
            document.getElementById('stock-list').innerHTML = list.map(s => `
                <div class="stock-item ${s.Code === currentSymbol ? 'active' : ''}" onclick="selectStock('${s.Code}', '${s.Name}')">
                    <span>${s.Code}</span><span style="opacity:0.6">${s.Name}</span>
                </div>
            `).join('');
        }

        async function loadHistoryFromCloud(symbol) {
            const statusText = document.getElementById('status-text');
            statusText.innerText = "⏳ 正在從雲端數據庫搬運半年歷史資料...";
            
            const startDate = new Date();
            startDate.setMonth(startDate.getMonth() - 8);
            const finMindUrl = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${symbol}&start_date=${startDate.toISOString().split('T')[0]}`;
            
            try {
                const res = await fetch(finMindUrl);
                const json = await res.json();
                if (json.data && json.data.length > 0) {
                    const formatted = json.data.map(d => ({ time: d.date, open: d.open, high: d.max, low: d.min, close: d.close }));
                    const volumeData = json.data.map(d => ({ 
                        time: d.date, value: d.Trading_Volume, 
                        color: d.close >= d.open ? 'rgba(38, 166, 154, 0.5)' : 'rgba(239, 83, 80, 0.5)' 
                    }));
                    
                    candlestickSeries.setData(formatted);
                    volumeSeries.setData(volumeData);
                    ma5Series.setData(calculateSMA(formatted, 5));
                    ma20Series.setData(calculateSMA(formatted, 20));
                    ma60Series.setData(calculateSMA(formatted, 60));
                    chart.timeScale().fitContent();
                    statusText.innerText = "✅ 雲端歷史數據加載成功";
                } else {
                    statusText.innerText = "❌ 伺服器目前未回傳歷史資料 (維護中)";
                }
            } catch (e) {
                statusText.innerText = "❌ 無法連接雲端數據庫";
            }
        }

        async function selectStock(code, name) {
            currentSymbol = code;
            document.getElementById('current-title').innerText = `${code} ${name}`;
            currentTarget = parseFloat(prompt(`設定 ${name} 目標價:`, "0")) || 0;
            document.getElementById('target-val').innerText = `GOAL: ${currentTarget}`;
            
            tickLog = []; 
            document.getElementById('tick-body').innerText = "";
            await loadHistoryFromCloud(code);
            await fetchRealtimeSync();
        }

        async function fetchRealtimeSync() {
            if (!currentSymbol) return;
            try {
                const response = await fetch(twseUrl);
                const allData = await response.json();
                const s = allData.find(x => x.Code === currentSymbol);
                if (s) {
                    const price = parseFloat(s.ClosingPrice);
                    document.getElementById('price-val').innerText = price.toFixed(2);
                    
                    const time = new Date().toISOString().split('T')[0];
                    candlestickSeries.update({ time, open: parseFloat(s.OpeningPrice)||price, high: parseFloat(s.HighestPrice)||price, low: parseFloat(s.LowestPrice)||price, close: price });
                    volumeSeries.update({ time, value: parseFloat(s.TradeVolume) || 0 });

                    tickLog.unshift(`[${new Date().toLocaleTimeString()}] $${price.toFixed(2)}`);
                    if (tickLog.length > 5) tickLog.pop();
                    document.getElementById('tick-body').innerHTML = tickLog.join('<br>');

                    if (price >= currentTarget && currentTarget > 0) document.getElementById('alert-panel').style.background = "#2a1414";
                    else document.getElementById('alert-panel').style.background = "#161b22";
                }
            } catch (e) {}
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            const k = e.target.value.toLowerCase();
            renderStockList(allStocks.filter(s => s.Code.includes(k) || s.Name.includes(k)).slice(0, 50));
        });

        initStockDatabase();
        setInterval(fetchRealtimeSync, 30000);
        window.onresize = () => chart.resize(container.clientWidth, 520);
    </script>
</body>
</html>
