<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>STOCKWATCH TERMINAL - 官方直連版</title>
    <style>
        /* --- 1. 專業金融介面：深色高對比設計 --- */
        * { box-sizing: border-box; }
        body {
            background-color: #0d1117; color: #d1d4dc;
            font-family: 'Segoe UI', 'SF Pro Display', sans-serif;
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        /* 頂部狀態列 */
        .header {
            position: absolute; top: 0; width: 100%; height: 40px;
            background: rgba(22, 27, 34, 0.9); backdrop-filter: blur(8px);
            border-bottom: 1px solid #30363d;
            display: flex; align-items: center; padding: 0 20px; font-size: 11px; z-index: 100;
        }
        .header .logo { color: #ff9800; font-weight: bold; letter-spacing: 2px; margin-right: 20px; }
        .header .status { margin-left: auto; display: flex; align-items: center; }
        .header .dot { width: 8px; height: 8px; background: #8b949e; border-radius: 50%; margin-right: 8px; }
        .header .dot.active { animation: blink 1s infinite; }

        /* 左側自選股 */
        .left-panel {
            width: 260px; background-color: #161b22;
            border-right: 1px solid #30363d; padding: 50px 10px 10px 10px;
        }
        .stock-item {
            cursor: pointer; padding: 15px; border-radius: 10px;
            margin-bottom: 8px; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            background: #0d1117; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid transparent;
        }
        .stock-item:hover { background: #21262d; }
        .stock-item.active { 
            background: #1c2128; border: 1px solid #58a6ff;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.15);
        }

        /* 右側核心區 */
        .right-panel { flex: 1; padding: 50px 20px 20px 20px; display: flex; flex-direction: column; }
        #chart-container { 
            flex: 1; background: #0d1117; 
            border: 1px solid #30363d; border-radius: 12px; margin-bottom: 20px; 
            overflow: hidden;
        }

        /* 警報資訊面板 */
        .alert-panel {
            background: #161b22; border: 1px solid #30363d;
            border-radius: 12px; padding: 25px; transition: 0.4s ease;
        }
        .alert-panel.triggered {
            background: #2a1414; border: 1px solid #f85149;
            animation: pulse-red 1.5s infinite;
        }

        .price-display { font-size: 56px; font-weight: bold; color: white; letter-spacing: -2px; font-variant-numeric: tabular-nums; }
        .target-tag { background: #238636; color: white; padding: 4px 12px; border-radius: 6px; font-weight: bold; font-size: 14px; margin-left: 15px; }
        
        @keyframes blink { 50% { opacity: 0; } }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0px #f85149; } 50% { box-shadow: 0 0 25px rgba(248,81,73,0.3); } 100% { box-shadow: 0 0 0px #f85149; } }
    </style>
</head>
<body>

    <div class="header">
        <span class="logo">STOCKWATCH TERMINAL</span>
        <span style="opacity: 0.5;">APP MODE | TWSE DIRECT CONNECT</span>
        <div class="status">
            <div class="dot active" id="status-dot"></div>
            <span id="update-time">等待連線...</span>
        </div>
    </div>

    <div class="left-panel">
        <div class="stock-item active" data-symbol="2330" data-target="1100"><span>2330 台積電</span></div>
        <div class="stock-item" data-symbol="2409" data-target="28.0"><span>2409 友達</span></div>
        <div class="stock-item" data-symbol="2317" data-target="230"><span>2317 鴻海</span></div>
    </div>

    <div class="right-panel">
        <h2 id="current-title" style="margin: 0 0 10px 0; color: white; font-weight: 500;">2330 台積電</h2>
        <div id="chart-container"></div>
        
        <div class="alert-panel" id="alert-panel">
            <div style="display: flex; align-items: center; margin-bottom: 5px;">
                <span class="price-display" id="price-val">---</span>
                <span class="target-tag" id="target-val">GOAL: 1100</span>
            </div>
            <p id="status-text" style="margin: 0; opacity: 0.6; font-size: 14px;">初始化系統...</p>
        </div>
    </div>

    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>

    <script>
        const twseUrl = "https://openapi.twse.com.tw/v1/stock/ALL";

        const container = document.getElementById('chart-container');
        const priceVal = document.getElementById('price-val');
        const targetVal = document.getElementById('target-val');
        const alertPanel = document.getElementById('alert-panel');
        const statusText = document.getElementById('status-text');
        const updateTime = document.getElementById('update-time');
        const dot = document.getElementById('status-dot');

        let currentSymbol = '2330';
        let currentTarget = 1100;

        // 1. 初始化圖表
        const chart = LightweightCharts.createChart(container, {
            width: container.clientWidth, height: 450,
            layout: { backgroundColor: '#0d1117', textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#1f2937' }, horzLines: { color: '#1f2937' } },
            timeScale: { borderColor: '#30363d' },
            rightPriceScale: { borderColor: '#30363d' }
        });
        const candlestickSeries = chart.addCandlestickSeries({
            upColor: '#26a69a', downColor: '#ef5350',
            wickUpColor: '#26a69a', wickDownColor: '#ef5350',
        });

        // 🌟 2. 核心功能：直連證交所 (強化偵錯)
        async function fetchMarketData() {
            try {
                statusText.innerHTML = "⏳ 正在請求官方即時數據...";
                dot.style.background = "#ff9800";

                const response = await fetch(twseUrl);
                
                if (!response.ok) {
                    throw new Error(`伺服器代碼: ${response.status} (可能是維護中)`);
                }
                
                const allData = await response.json();
                
                // 凌晨檢查：如果伺服器回傳空陣列
                if (!allData || allData.length === 0) {
                    throw new Error("伺服器目前未回傳任何資料 (凌晨維護時段)");
                }

                const stock = allData.find(s => s.Code === currentSymbol);

                if (stock) {
                    const price = parseFloat(stock.ClosingPrice);
                    priceVal.innerText = price.toFixed(2);
                    targetVal.innerText = `GOAL: ${currentTarget}`;
                    updateTime.innerText = "官方直連: " + new Date().toLocaleTimeString();
                    dot.style.background = "#238636"; 
                    statusText.innerText = "✅ 官方數據同步中 (直連模式)";

                    candlestickSeries.update({
                        time: Math.floor(Date.now() / 1000),
                        open: parseFloat(stock.OpeningPrice) || price,
                        high: parseFloat(stock.HighestPrice) || price,
                        low: parseFloat(stock.LowestPrice) || price,
                        close: price
                    });

                    if (price >= currentTarget) {
                        alertPanel.classList.add('triggered');
                        statusText.innerHTML = `⚠️ <b>達標！</b> 報價 ${price} 已觸發警報。`;
                    } else {
                        alertPanel.classList.remove('triggered');
                        statusText.innerText = `監控中... 距離目標還差 ${(currentTarget - price).toFixed(2)} 元`;
                    }
                } else {
                    throw new Error(`找不到股票代碼 ${currentSymbol} 的今日數據`);
                }
            } catch (error) {
                console.error("連線錯誤:", error);
                dot.style.background = "#f85149";
                statusText.innerHTML = `❌ <span style='color:#f85149'>連線狀態: ${error.message}</span><br><small>註：現在是凌晨維護時間，請等早晨開盤再試。</small>`;
            }
        }

        document.querySelectorAll('.stock-item').forEach(item => {
            item.addEventListener('click', function() {
                currentSymbol = this.getAttribute('data-symbol');
                currentTarget = parseFloat(this.getAttribute('data-target'));
                document.getElementById('current-title').innerText = this.innerText;
                document.querySelectorAll('.stock-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
                candlestickSeries.setData([]); 
                fetchMarketData();
            });
        });

        setInterval(fetchMarketData, 15000);
        fetchMarketData();

        window.onresize = () => chart.resize(container.clientWidth, 450);
    </script>
</body>
</html>
